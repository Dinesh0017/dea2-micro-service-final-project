name: Deploy Backend to Azure VM (deploy-sls)

on:
  push:
    branches:
      - deploy-sls
    paths:
      - "backend/Storage Location Service/**"

jobs:
  build-and-deploy:
    runs-on: self-hosted

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: "21"
          distribution: "corretto"

      - name: Build with Maven
        working-directory: "./backend/Storage Location Service"
        run: mvn clean package -DskipTests

      - name: Deploy and Restart Application
        run: |
          set -e

          # Validate required DB secrets before writing .env
          DB_URL="${{ secrets.DB_URL }}"
          DB_USERNAME="${{ secrets.DB_USERNAME }}"
          DB_PASSWORD="${{ secrets.DB_PASSWORD }}"
          if [ -z "$DB_URL" ] || [ -z "$DB_USERNAME" ] || [ -z "$DB_PASSWORD" ]; then
            echo "DB_URL, DB_USERNAME and DB_PASSWORD must all be set in GitHub Secrets."
            exit 1
          fi

          # 1. Create the deployment directory
          mkdir -p /home/azureuser/backend-app

          # 2. Copy the .jar specifically from the backend's target folder
          cp 'backend/Storage Location Service/target/'*.jar /home/azureuser/backend-app/application.jar

          # 3. Create the .env file with database credentials securely
          echo "DB_URL=$DB_URL" > /home/azureuser/backend-app/.env
          echo "DB_USERNAME=$DB_USERNAME" >> /home/azureuser/backend-app/.env
          echo "DB_PASSWORD=$DB_PASSWORD" >> /home/azureuser/backend-app/.env

          # 4. Secure the .env file so only the 'azureuser' user can read it
          chmod 600 /home/azureuser/backend-app/.env

          # 5. Restart the background service
          sudo systemctl restart spring-backend.service

          # 6. Verify service health and print logs if startup fails
          sleep 12
          if ! curl -fsS http://127.0.0.1:8083/actuator/health >/dev/null; then
            sudo systemctl status spring-backend.service --no-pager || true
            sudo journalctl -u spring-backend.service -n 120 --no-pager || true
            exit 1
          fi
