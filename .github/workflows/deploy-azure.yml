name: Deploy Backend to Azure VM

on:
  push:
    branches:
      - deploy-nipun
    paths:
      - "backend/Workforce & Equipment Service/**"

jobs:
  build-and-deploy:
    runs-on: [self-hosted, azure-vm]

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Build and Deploy with Docker
        run: |
          # 1. Create the .env file with database credentials securely
          mkdir -p /home/nippa/backend-app
          echo "DB_URL=${{ secrets.DB_URL }}" > /home/nippa/backend-app/.env
          echo "DB_USERNAME=${{ secrets.DB_USERNAME }}" >> /home/nippa/backend-app/.env
          echo "DB_PASSWORD=${{ secrets.DB_PASSWORD }}" >> /home/nippa/backend-app/.env
          chmod 600 /home/nippa/backend-app/.env

          # 2. Build the Docker image
          cd "backend/Workforce & Equipment Service"
          sudo docker build -t workforce-service .

          # 3. Stop and remove the existing container if it exists
          sudo docker stop workforce-service || true
          sudo docker rm workforce-service || true

          # 4. Run the new container
          sudo docker run -d \
            --name workforce-service \
            --env-file /home/nippa/backend-app/.env \
            -p 8080:8080 \
            --restart always \
            workforce-service